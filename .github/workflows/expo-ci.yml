name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          CI: 1

      - name: Clean expo cache
        run: |
          rm -rf node_modules/.cache
          rm -rf ~/.expo

      - name: Check Expo version
        run: npx expo --version

      - name: Generate native Android project with EAS
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1
          CI: 1

      - name: Install Android dependencies
        run: cd android && ./gradlew assembleDebug --no-daemon -x lint -Dorg.gradle.jvmargs=-Xmx2048m
        working-directory: .

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: Longinsent-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: List built APKs
        if: success()
        run: ls -la android/app/build/outputs/apk/*/app*.apk